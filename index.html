<!DOCTYPE html>
<html>
<head>
    <title>FreshCut Barbershop</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: url('barber.jpg') no-repeat center/cover;
            color: white;
            padding: 100px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 40px;
        }

        section {
            padding: 40px;
            text-align: center;
        }

        .services {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            background: green;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>
    <h1>FreshCut Barbershop</h1>
    <p>Clean cuts. Fresh style.</p>
    <a class="btn" href="https://wa.me/2348012345678">Book on WhatsApp</a>
</header>

<section>
    <h2>Our Services</h2>
    <div class="services">
        <div class="card">
            <h3>Haircut</h3>
            <p>₦3,000</p>
        </div>

        <div class="card">
            <h3>Beard Trim</h3>
            <p>₦1,500</p>
        </div>

        <div class="card">
            <h3>Home Service</h3>
            <p>₦10,000</p>
        </div>
    </div>
</section>

<section>
    <h2>Our Shop</h2>
    <img src="shop.jpg" width="300">
</section>

<section>
    <h2>Contact</h2>
    <p>Call: +2349168144059</p>
</section>

</body>
</html>
