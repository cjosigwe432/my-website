<!DOCTYPE html>
<html>
<head>
    <title>FreshCut Barbershop</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                        url('barber.jpg') no-repeat center/cover;
            text-align: center;
            padding: 120px 20px;
        }

        header h1 {
            font-size: 45px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 18px;
            color: #ccc;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            background: gold;
            color: black;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
        }

        section {
            padding: 60px 20px;
            text-align: center;
        }

        h2 {
            color: gold;
            margin-bottom: 20px;
        }

        .services {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            background: #1c1c1c;
            padding: 25px;
            border-radius: 15px;
            width: 220px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .price {
            color: gold;
            font-size: 20px;
            margin-top: 10px;
        }

        img {
            border-radius: 10px;
            margin-top: 20px;
        }

        footer {
            background: #000;
            padding: 20px;
            text-align: center;
            color: #888;
        }
    </style>
</head>

<body>

<header>
    <h1>FreshCut Barbershop</h1>
    <p>Clean cuts. Fresh style. Premium experience.</p>
    <a class="btn" href="https://wa.me/2349168144059">Book on WhatsApp</a>
</header>

<section>
    <h2>Our Services</h2>

    <div class="services">
        <div class="card">
            <h3>Haircut</h3>
            <p class="price">₦3,000</p>
        </div>

        <div class="card">
            <h3>Beard Trim</h3>
            <p class="price">₦1,500</p>
        </div>

        <div class="card">
            <h3>Home Service</h3>
            <p class="price">₦10,000</p>
        </div>
    </div>
</section>

<section>
    <h2>Our Shop</h2>

</html>
